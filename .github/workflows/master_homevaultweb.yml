name: Deploy static site to Azure Web App

on:
  push:
    branches:
       - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site package
        shell: bash
        run: |
          set -e
          rm -rf site
          mkdir -p site

          for file in index.html 404.html privacy-policy.html support.html terms.html; do
            if [ -f "$file" ]; then
              cp "$file" site/
            fi
          done

          if [ -d assets ]; then
            cp -R assets site/
          fi

          echo "Package contents:"
          find site | sort

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: homevaultweb
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE }}
          package: ./site
