<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — HomeGuard</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --primary-blue: #185FA5;
    --dark-blue: #0C447C;
    --light-blue: #E6F1FB;
    --primary-green: #1D9E75;
    --dark-green: #0F6E56;
    --light-green: #E1F5EE;
    --text-dark: #0C447C;
    --text-muted: #5F5E5A;
    --page-bg: #F8FAFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--page-bg);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.6;
  }
  .card {
    background: white;
    max-width: 520px;
    width: 100%;
    padding: 48px 40px;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(12, 68, 124, 0.08);
    text-align: center;
  }
  .icon {
    width: 80px;
    height: 80px;
    background: var(--light-green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .icon svg {
    width: 44px;
    height: 44px;
    stroke: var(--primary-green);
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  h1 {
    font-size: 28px;
    color: var(--dark-blue);
    margin-bottom: 12px;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 32px;
    font-size: 16px;
  }
  .next-steps {
    background: var(--light-blue);
    padding: 20px;
    border-radius: 10px;
    text-align: left;
    margin-bottom: 24px;
  }
  .next-steps h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--primary-blue);
    margin-bottom: 8px;
  }
  .next-steps p {
    font-size: 14px;
    color: var(--text-dark);
  }
  .help {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 24px;
  }
  .help a {
    color: var(--primary-blue);
    text-decoration: none;
  }
  .help a:hover { text-decoration: underline; }
  .brand {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<main class="card" role="main">
  <div class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
  </div>

  <h1>Payment Successful</h1>
  <p class="subtitle">Thanks for activating HomeGuard. Your receipt is on its way to your email.</p>

  <div class="next-steps">
    <h2>What's next</h2>
    <p>Open the HomeGuard app on your phone. Your account will unlock automatically within a few seconds.</p>
  </div>

  <p class="help">
    Need help? Email <a href="mailto:support@homeinventoryhq.com">support@homeinventoryhq.com</a>
  </p>

  <p class="brand">HomeGuard by HomeInventoryHQ</p>
</main>
</body>
</html>
